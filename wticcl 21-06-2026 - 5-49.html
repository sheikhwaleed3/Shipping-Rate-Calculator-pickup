<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WTICCL – Global Shipping Forwarder</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0A1628;--navy2:#0D1F3C;--navy3:#162847;
  --gold:#C9952A;--gold2:#E8B84B;--gold3:#F5D07A;
  --blue:#1B4FBF;--blue2:#2563EB;--blue3:#3B82F6;
  --green:#059669;--amber:#D97706;--red:#DC2626;
  --bg:#F8F9FC;--bgcard:#FFFFFF;--bg2:#EEF1F8;
  --border:#DDE3F0;--border2:#C5CDE8;
  --text:#1A2340;--muted:#5A6480;--white:#FFFFFF;
}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;min-height:100vh;}
input,select,textarea{outline:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;}
button{font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.mono{font-family:'JetBrains Mono',monospace;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .25s ease;}
.app{display:flex;min-height:100vh;}
.sidebar{width:240px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;box-shadow:4px 0 24px rgba(10,22,40,.35);}
.sidebar-logo{padding:22px 18px 20px;border-bottom:1px solid rgba(255,255,255,.08);}
.logo-wrap{display:flex;align-items:center;gap:11px;}
.logo-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:linear-gradient(135deg,var(--gold),var(--gold2));}
.logo-name{font-weight:800;font-size:16px;color:var(--white);}
.logo-tag{font-size:9px;color:var(--gold3);margin-top:2px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;}
.sidebar-nav{flex:1;padding:12px 0;}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 18px;border:none;background:transparent;font-size:13px;font-weight:500;cursor:pointer;text-align:left;border-left:3px solid transparent;transition:all .15s;color:rgba(255,255,255,.5);}
.nav-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);}
.nav-btn.active{font-weight:700;border-left-color:var(--gold2);background:rgba(201,149,42,.12);color:var(--gold3);}
.nav-btn.active-admin{font-weight:700;border-left-color:var(--blue3);background:rgba(37,99,235,.15);color:#93C5FD;}
.sidebar-footer{padding:16px 18px;border-top:1px solid rgba(255,255,255,.08);}
.main{flex:1;padding:28px 36px;overflow-y:auto;max-height:100vh;}
.card{background:var(--bgcard);border:1px solid var(--border);border-radius:12px;padding:22px;box-shadow:0 1px 4px rgba(10,22,40,.06);}
.btn{padding:9px 20px;border-radius:8px;border:none;font-weight:700;font-size:13px;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
.btn:hover{opacity:.9;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-navy{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);}
.btn-green{background:linear-gradient(135deg,var(--green),#047857);color:#fff;}
.btn-danger{background:linear-gradient(135deg,var(--red),#B91C1C);color:#fff;}
.btn-ghost{background:transparent;color:var(--blue2);border:1.5px solid var(--blue2);}
.btn-muted{background:var(--bg2);color:var(--text);border:1px solid var(--border);}
.btn-sm{padding:6px 13px;font-size:12px;}
.btn-full{width:100%;}
.field{margin-bottom:14px;}
.field-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:5px;}
.req{color:var(--red);}
.inp{width:100%;background:var(--bg2);color:var(--text);border:1.5px solid var(--border);padding:9px 12px;border-radius:8px;transition:border-color .15s;}
.inp:focus{border-color:var(--blue2);background:var(--bgcard);}
textarea.inp{resize:vertical;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;}
.badge-sm{padding:2px 8px;font-size:11px;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{text-align:left;padding:9px 12px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid var(--border);white-space:nowrap;font-weight:700;}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:hover td{background:var(--bg2);}
.modal-backdrop{position:fixed;inset:0;background:rgba(10,22,40,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal-box{background:var(--bgcard);border:1px solid var(--border);border-radius:14px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(10,22,40,.3);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.modal-title{font-size:18px;font-weight:800;color:var(--navy);}
.modal-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;}
.toast{position:fixed;bottom:22px;right:22px;padding:13px 22px;border-radius:10px;font-weight:700;font-size:13px;z-index:2000;box-shadow:0 6px 24px rgba(0,0,0,.2);pointer-events:none;color:#fff;display:none;}
.cargo-card{border:2px solid var(--border);background:var(--bg2);border-radius:10px;padding:12px 8px;cursor:pointer;text-align:center;transition:all .15s;}
.cargo-card:hover{border-color:var(--blue2);}
.cargo-card.selected{border-color:var(--gold);background:linear-gradient(135deg,#FFFBF0,#FFF5D6);box-shadow:0 2px 10px rgba(201,149,42,.2);}
.cargo-card.selected .cargo-label{color:var(--gold);}
.cargo-label{font-size:12px;font-weight:700;margin-top:5px;color:var(--text);}
.cargo-icon{font-size:24px;}
.stitle{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:5px;}
.ssub{color:var(--muted);font-size:13px;margin-bottom:22px;}
.gold-bar{height:3px;width:48px;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;margin-bottom:16px;}
.svc-card{border:2px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;}
.svc-card.best{border-color:var(--gold);background:#FFFBF0;}
.pill-tab{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--bgcard);font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);}

.auth-tab{flex:1;padding:8px 0;border-radius:6px;border:none;font-weight:700;font-size:13px;cursor:pointer;background:transparent;color:var(--muted);}

.home-page{min-height:100vh;background:linear-gradient(160deg,#0A1628 0%,#0D1F3C 50%,#0B2547 100%);}
.home-nav{display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(10,22,40,.8);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;}
.home-hero{padding:60px 48px;display:flex;align-items:center;justify-content:space-between;gap:48px;min-height:calc(100vh - 70px);}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(201,149,42,.15);border:1px solid rgba(201,149,42,.3);border-radius:30px;padding:6px 16px;font-size:12px;font-weight:700;color:var(--gold2);letter-spacing:1px;text-transform:uppercase;margin-bottom:28px;}
.hero-title{font-size:52px;font-weight:800;color:#fff;line-height:1.08;margin-bottom:14px;}

.hero-sub{font-size:15px;color:rgba(255,255,255,.6);line-height:1.7;margin-bottom:36px;max-width:480px;}

.portal-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;}
.portal-title{font-weight:800;font-size:15px;color:#fff;margin-bottom:8px;}
.portal-sub{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:16px;line-height:1.5;}
.hero-right{flex-shrink:0;width:380px;}
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}

.hstat-num{font-size:28px;font-weight:800;color:var(--gold2);font-family:'JetBrains Mono',monospace;}
.hstat-label{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;font-weight:600;}
.hero-services{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:18px;}
.svc-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);}

.svc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.svc-days{margin-left:auto;font-size:11px;font-weight:700;color:var(--gold2);background:rgba(201,149,42,.15);border-radius:20px;padding:2px 10px;}

function garmRate(zip, kg) {
  const w = parseFloat(kg)||0;
  if (w <= 0) return null;
  const z = getZone(zip);
  const zk = 'z'+z;
  let price = 0;
  if (w >= 1 && w <= 24) {

    const wc = Math.ceil(w);
    const b = GB[zk].find(b => wc >= b.lo && wc <= b.hi);

  if (!price) return null;
  return { name:'JFK Direct Garments — Tax Paid / DDP', type:'Tax Paid (DDP)', price:Math.round(price), transit:'8–10 W-Days', zone:'Zone '+z };

const UDB_CA=[{lo:21,hi:30,r:3700},{lo:31,hi:40,r:3400},{lo:41,hi:60,r:3300},{lo:61,hi:70,r:3300},{lo:71,hi:100,r:3300},{lo:101,hi:99999,r:3300}];
// Direct DHL (USA only)
const DD=[24875,31221,36593,42083,47067,49661,55893,59315,64048,68780,71456,73733,76009,78286,80563,83154,85900,87708,89984,92261];
const DDB=[{lo:21,hi:25,r:4630},{lo:26,hi:40,r:3550},{lo:41,hi:60,r:3300},{lo:61,hi:99999,r:3200}];

function lookupFixed(tbl, brackets, w) {
  const wc = Math.ceil(w);
  if (w >= 1 && w <= tbl.length) return tbl[Math.round(w)-1]||0;
  const b = brackets.find(b => wc >= b.lo && wc <= b.hi);
  return b ? wc * b.r : 0;
}

function printRate(zip, country, kg) {
  const w = parseFloat(kg)||0;
  if (w <= 0) return [];
  const isCA = (country||'').toUpperCase().includes('CANADA');
  const z = isCA ? 1 : getZone(zip);
  const zk = 'z'+z;
  const res = [];

  // JFK Direct — USA only, zone-based
  if (!isCA) {
    const p = lookupFixed(PJ[zk], PJB[zk], w);
    if (p) res.push({name:'JFK Direct Flight',type:'Tax Paid',price:Math.round(p),transit:'8–12 W-Days',zone:'Zone '+z,fastest:false});
  }
  // Via UK UPS Expedite
  {
    const tbl = isCA ? UE_CA : UE_US;
    const brk = isCA ? UEB_CA : UEB_US;
    const p = lookupFixed(tbl, brk, w);
    if (p) res.push({name:'Via UK – UPS Expedite',type:'Non-Tax Paid',price:Math.round(p),transit:'8–12 W-Days',zone:'',fastest:false});
  }
  // Via UK UPS Saver
  {
    const tbl = isCA ? US_CA : US_US;
    const brk = isCA ? USB_CA : USB_US;
    const p = lookupFixed(tbl, brk, w);
    if (p) res.push({name:'Via UK – UPS Saver',type:'Non-Tax Paid',price:Math.round(p),transit:'7–8 W-Days',zone:'',fastest:false});
  }
  // Via UK DHL
  {
    const tbl = isCA ? UD_CA : UD_US;
    const brk = isCA ? UDB_CA : UDB_US;
    const p = lookupFixed(tbl, brk, w);
    if (p) res.push({name:'Via UK – DHL',type:'Non-Tax Paid',price:Math.round(p),transit:'6–7 W-Days',zone:'',fastest:false});
  }
  // Direct DHL — USA only
  if (!isCA) {
    const p = lookupFixed(DD, DDB, w);
    if (p) res.push({name:'Direct DHL',type:'Tax Paid',price:Math.round(p),transit:'4–6 W-Days',zone:'',fastest:true});
  }
  return res.sort((a,b)=>a.price-b.price);
}

const MOCK_TRACKS = {
  dhl:  {"DHL123456789":{carrier:"DHL Express",status:"In Transit",origin:"Karachi, PK",dest:"New York, USA",events:[{t:"Jun 20 09:14",l:"JFK Customs",s:"Customs Clearance"},{t:"Jun 19 22:30",l:"Frankfurt Hub",s:"Departed Hub"},{t:"Jun 19 14:00",l:"Karachi Airport",s:"Picked Up"}]}},
  fedex:{"FDX987654321":{carrier:"FedEx International",status:"Out for Delivery",origin:"Lahore, PK",dest:"Chicago, USA",events:[{t:"Jun 20 08:00",l:"Chicago, IL",s:"Out for Delivery"},{t:"Jun 20 05:30",l:"Chicago Facility",s:"Arrived"},{t:"Jun 19 18:00",l:"Lahore",s:"Picked Up"}]}},
  ups:  {"UPS112233445":{carrier:"UPS Worldwide",status:"Delivered",origin:"Islamabad, PK",dest:"Seattle, USA",events:[{t:"Jun 19 14:22",l:"Seattle, WA",s:"Delivered – Front Door"},{t:"Jun 19 06:10",l:"Seattle, WA",s:"Out for Delivery"},{t:"Jun 18 21:00",l:"Portland, OR",s:"In Transit"}]}},
  iata: {"IATA-AWB-001":{carrier:"IATA Air Cargo",status:"In Transit",origin:"Karachi (KHI)",dest:"JFK New York",events:[{t:"Jun 20 06:00",l:"JFK Airport",s:"Arrived – Awaiting Customs"},{t:"Jun 19 20:00",l:"Amsterdam (AMS)",s:"Transit Hub"},{t:"Jun 19 08:00",l:"KHI Airport",s:"Departed Origin"}]}},
};

function renderTracking() {
  if (!S.trackState || !S.trackState.wticcl) {
    S.trackState = {wticcl:{q:'',err:''},dhl:{q:'',err:''},fedex:{q:'',err:''},ups:{q:'',err:''},iata:{q:'',err:''}};
  }
  const ts = S.trackState;

  const carriers = [
    {k:'wticcl',label:'WTICCL Shipments',icon:'✈',color:'var(--navy)',sample:null},
    {k:'dhl',   label:'DHL Express',     icon:'🟡',color:'#92400E',  sample:'DHL123456789'},
    {k:'fedex', label:'FedEx',           icon:'🟠',color:'#B45309',  sample:'FDX987654321'},
    {k:'ups',   label:'UPS',             icon:'🟤',color:'#C2410C',  sample:'UPS112233445'},
    {k:'iata',  label:'IATA Air Cargo',  icon:'🛫',color:'#1D4ED8',  sample:'IATA-AWB-001'},
  ];

  function getResult(k, q) {
    if (!q) return null;
    const qu = q.toUpperCase().trim();
    if (k==='wticcl') {
      const s = S.shipments.find(x=>x.trackId===qu);
      if (!s) return null;
      return {carrier:'WTICCL',status:s.status,origin:s.from,dest:s.to,weight:s.weight+'kg',price:s.price,createdAt:s.createdAt,events:[{t:s.createdAt,l:s.from+' – WTICCL Hub',s:'Shipment Confirmed'},{t:'Pending',l:'Processing Centre',s:'Processing & Documentation'}]};
    }
    return (MOCK_TRACKS[k]||{})[qu] || null;
  }

  function tline(events, color) {
    return (events||[]).map((ev,i)=>`
    <div style="display:flex;gap:10px;margin-bottom:12px;">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div style="width:10px;height:10px;border-radius:50%;flex-shrink:0;background:${i===0?color:'var(--border2)'};border:2px solid ${i===0?color:'var(--border)'};margin-top:2px;"></div>
        ${i<(events.length-1)?'<div style="width:2px;flex:1;background:var(--border);margin-top:4px;min-height:14px;"></div>':''}
      </div>
      <div>
        <div style="font-weight:700;font-size:12px;color:${i===0?'var(--navy)':'var(--text)'};">${esc(ev.s||ev.status)}</div>
        <div style="font-size:11px;color:var(--muted);">${esc(ev.l||ev.loc)}</div>
        <div class="mono" style="font-size:10px;color:var(--muted);">${esc(ev.t||ev.time)}</div>
      </div>
    </div>`).join('');
  }

  return `
  <div>
    <div class="gold-bar"></div>
    <div class="stitle">Track Shipment</div>
    <div class="ssub">Separate search bar for each carrier — enter any ID and hit Track</div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      ${carriers.map(c=>{
        const st = ts[c.k]||{q:'',err:''};
        const res = getResult(c.k, st.q);
        const[sc,sbg] = res ? statusColors(res.status) : ['',''];
        return `
        <div class="card" style="border-left:4px solid ${c.color};">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
            <span style="font-size:20px;">${c.icon}</span>
            <span style="font-weight:800;font-size:15px;color:${c.color};">${c.label}</span>
            ${c.sample?`<button class="btn btn-sm" data-action="fill-track" data-carrier="${c.k}" data-val="${c.sample}" style="background:var(--bg2);color:${c.color};border:1.5px solid ${c.color}44;margin-left:auto;font-size:11px;">Try: ${c.sample}</button>`:'<span style="margin-left:auto;font-size:11px;color:var(--muted);">Your WTICCL bookings</span>'}
          </div>
          <div style="display:flex;gap:10px;">
            <input id="trk-${c.k}" class="inp" placeholder="Enter ${c.label} tracking number..." value="${esc(st.q)}" style="font-family:'JetBrains Mono',monospace;font-size:13px;">
            <button class="btn btn-sm" data-action="do-track" data-carrier="${c.k}" style="background:${c.color};color:#fff;flex-shrink:0;padding:9px 18px;">Track</button>
          </div>
          ${st.err?`<div style="color:var(--red);font-size:12px;font-weight:600;margin-top:8px;">⚠ ${esc(st.err)}</div>`:''}
          ${res?`
          <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start;">
                ${[['Carrier',res.carrier],['Status',null],['Origin',res.origin],['Destination',res.dest],res.weight?['Weight',res.weight]:null,res.price?['Cost',pkr(res.price)]:null].filter(Boolean).map(([k,v])=>`
                <div style="background:var(--bg2);border-radius:7px;padding:9px 11px;">
                  <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;">${k}</div>
                  ${k==='Status'?`<div style="margin-top:4px;">${badge(res.status,sc,sbg,true)}</div>`:`<div style="font-weight:700;font-size:12px;margin-top:3px;color:var(--navy);">${esc(v)}</div>`}
                </div>`).join('')}
              </div>
              <div>
                <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Timeline</div>
                ${tline(res.events, c.color)}
              </div>
            </div>
          </div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function attachEvents() {
  document.addEventListener('click', handleClick, {once:true});

  // Live search filters
  const sf=document.getElementById('ship-filter');
  if(sf) sf.addEventListener('input',e=>{S.adminShipFilter=e.target.value;ss({});});
  const pf=document.getElementById('pk-filter');
  if(pf) pf.addEventListener('input',e=>{S.adminPkFilter=e.target.value;ss({});});

  // Auth tabs
  const tl=document.getElementById('tab-login'), tr=document.getElementById('tab-reg');
  if(tl) tl.addEventListener('click',()=>{
    document.getElementById('auth-area').innerHTML=loginForm();
    attachAuthBtns();
    tl.style.cssText='background:linear-gradient(135deg,var(--navy),var(--blue2));color:#fff;';
    tr.style.cssText='background:transparent;color:var(--muted);';
  });
  if(tr) tr.addEventListener('click',()=>{
    document.getElementById('auth-area').innerHTML=regForm();
    attachAuthBtns();
    tr.style.cssText='background:linear-gradient(135deg,var(--navy),var(--blue2));color:#fff;';
    tl.style.cssText='background:transparent;color:var(--muted);';
  });
  attachAuthBtns();

  // Enter key on tracking inputs
  ['wticcl','dhl','fedex','ups','iata'].forEach(c=>{
    const el=document.getElementById('trk-'+c);
    if(el) el.addEventListener('keydown',e=>{ if(e.key==='Enter') doTrack(c); });
  });

  // Rate upload (demo)
  const ru=document.getElementById('rate-upload');
  if(ru) ru.addEventListener('change',()=>toast('Excel upload received — connect backend to parse.','#D97706'));
}

function attachAuthBtns() {
  const dl=document.querySelector('[data-action="do-login"]');     if(dl) dl.addEventListener('click',doLogin);
  const dr=document.querySelector('[data-action="do-register"]');  if(dr) dr.addEventListener('click',doRegister);
  const da=document.querySelector('[data-action="do-admin-login"]'); if(da) da.addEventListener('click',doAdminLogin);
}

function handleClick(e) {
  const el = e.target.closest('[data-action],[data-cpage],[data-apage],[data-cargo]');
  if (!el) { document.addEventListener('click',handleClick,{once:true}); return; }

  const action=el.dataset.action, cp=el.dataset.cpage, ap=el.dataset.apage, cg=el.dataset.cargo;

  if (cp) { ss({custPage:cp}); return; }
  if (ap) { ss({adminPage:ap,adminShipFilter:'',adminPkFilter:''}); return; }
  if (cg) {
    const px=el.dataset.prefix;
    if (px==='calc' && S.calcState)   { S.calcState.cargo=cg;   S.calcState.results=null; }
    if (px==='pk'   && S.pickupState) { S.pickupState.cargo=cg; }
    if (px==='bk'   && S.bookState)   { S.bookState.cargo=cg;   }
    ss({}); return;
  }

  switch(action) {
    case 'goto-home':       ss({portal:'home'}); break;
    case 'goto-auth-cust':  ss({portal:'auth-cust'}); break;
    case 'goto-auth-admin': ss({portal:'auth-admin'}); break;
    case 'logout':          ss({portal:'home',user:null,custPage:'calculator',adminPage:'dashboard',calcState:null,pickupState:null,bookState:null,trackState:null}); break;
    case 'do-login':        doLogin(); break;
    case 'do-register':     doRegister(); break;
    case 'do-admin-login':  doAdminLogin(); break;
    case 'do-calc':         doCalc(); break;
    case 'do-pickup':       doPickup(); break;
    case 'do-book':         doBook(); break;
    case 'do-track':        doTrack(el.dataset.carrier); break;
    case 'fill-track': {
      const c=el.dataset.carrier, v=el.dataset.val;
      if(!S.trackState||!S.trackState.wticcl) S.trackState={wticcl:{q:'',err:''},dhl:{q:'',err:''},fedex:{q:'',err:''},ups:{q:'',err:''},iata:{q:'',err:''}};
      S.trackState[c]={q:v,err:''};
      ss({}); break;
    }
    case 'rate-tab':     ss({adminRateTab:el.dataset.tab}); break;
    case 'connect-api':  { if(!S.apiConn) S.apiConn={}; S.apiConn[el.dataset.carrier]=true; ss({}); toast(el.dataset.carrier.toUpperCase()+' API connected!'); break; }
    case 'edit-ship':    openEditShipModal(+el.dataset.idx); break;
    case 'del-ship':     if(confirm('Delete this shipment?')){ S.shipments.splice(+el.dataset.idx,1); ss({}); toast('Deleted.','#DC2626'); } break;
    case 'edit-pickup':  openEditPickModal(el.dataset.tok); break;
    case 'del-pickup':   if(confirm('Delete this pickup?')){ S.pickups=S.pickups.filter(p=>p.token!==el.dataset.tok); ss({}); toast('Deleted.','#DC2626'); } break;
    case 'edit-user':    openEditUserModal(el.dataset.email); break;
    case 'del-user':     if(confirm('Remove this customer?')){ S.users=S.users.filter(u=>u.email!==el.dataset.email); ss({}); toast('Removed.','#DC2626'); } break;
    case 'modal-close':  closeModal(); break;
    case 'save-ship':    saveShip(); break;
    case 'save-pickup':  savePickup(); break;
    case 'save-user':    saveUser(); break;
  }
  document.addEventListener('click',handleClick,{once:true});
}

function authErr(m){ const el=document.getElementById('auth-err'); if(el){el.textContent=m;el.style.display='block';} }

function doLogin() {
  const email=(document.getElementById('l-email')||{}).value||'';
  const pass =(document.getElementById('l-pass') ||{}).value||'';
  if(!email||!pass){ authErr('Email and password are required.'); return; }
  if(email===ADMIN_EMAIL&&pass===ADMIN_PASS){ ss({portal:'admin',user:{name:'Administrator',email}}); return; }
  const u=S.users.find(u=>u.email===email);
  if(u&&(u.pass===pass||pass==='demo')){ ss({portal:'customer',user:u}); return; }
  if(!u&&pass==='demo'){ const g={name:'Demo Customer',email,phone:'',company:'',pass:'demo',joinedAt:today()}; S.users.push(g); ss({portal:'customer',user:g}); return; }
  authErr('Invalid email or password.');
}

function doRegister() {
  const name   =(document.getElementById('r-name')||{}).value||'';
  const company=(document.getElementById('r-company')||{}).value||'';
  const phone  =(document.getElementById('r-phone')||{}).value||'';
  const email  =(document.getElementById('r-email')||{}).value||'';
  const pass   =(document.getElementById('r-pass')||{}).value||'';
  if(!name||!email||!pass){ authErr('Name, email and password are required.'); return; }
  if(S.users.find(u=>u.email===email)){ authErr('Account already exists.'); return; }
  const u={name,email,phone,company,pass,joinedAt:today()};
  S.users.push(u); ss({portal:'customer',user:u});
}

function doAdminLogin() {
  const email=(document.getElementById('a-email')||{}).value||'';
  const pass =(document.getElementById('a-pass') ||{}).value||'';
  if(email===ADMIN_EMAIL&&pass===ADMIN_PASS){ ss({portal:'admin',user:{name:'Administrator',email}}); return; }
  authErr('Invalid admin credentials.');
}

function readCalcForm() {
  const country=(document.getElementById('calc-country')||{}).value;
  const zip    =(document.getElementById('calc-zip')||{}).value||'';
  const weight =(document.getElementById('calc-weight')||{}).value||'';
  if (country) S.calcState.country=country;
  if (zip!==undefined) S.calcState.zip=zip;
  if (weight!==undefined) S.calcState.weight=weight;
}

function doCalc() {
  if (!S.calcState) S.calcState={cargo:'printing',country:'USA',zip:'',weight:'',results:null};
  readCalcForm();
  const c = S.calcState;
  // Always clear results first so stale data never shows
  c.results = null;
  const w = parseFloat(c.weight)||0;
  if (!w) { toast('Please enter a valid weight.','#DC2626'); ss({}); return; }

  if (c.cargo==='garments') {
    const r = garmRate(c.zip, w);
    c.results = r ? [r] : [];
  } else if (c.cargo==='printing') {
    c.results = printRate(c.zip, c.country, w);
  } else {
    c.results = 'others';
  }
  ss({});
}

function doPickup() {
  if (!S.pickupState) S.pickupState={cargo:'printing',fromCountry:'Pakistan',name:S.user.name||'',phone:'',address:'',date:'',slot:'',packages:'1',notes:''};
  const p=S.pickupState;
  p.name       =(document.getElementById('pk-name')||{}).value||p.name;
  p.phone      =(document.getElementById('pk-phone')||{}).value||p.phone;
  p.address    =(document.getElementById('pk-addr')||{}).value||p.address;
  p.fromCountry=(document.getElementById('pk-from')||{}).value||p.fromCountry;
  p.date       =(document.getElementById('pk-date')||{}).value||p.date;
  p.slot       =(document.getElementById('pk-slot')||{}).value||p.slot;
  p.packages   =(document.getElementById('pk-pkgs')||{}).value||p.packages;
  p.notes      =(document.getElementById('pk-notes')||{}).value||p.notes;
  if (!p.name||!p.address||!p.date){ toast('Please fill Name, Address and Date.','#DC2626'); return; }
  const token = tkn();
  S.pickups.push({...p,token,userId:S.user.email,status:'Scheduled',createdAt:today()});
  ss({});
  const tb=document.getElementById('pk-token-box');
  if(tb){
    tb.style.display='block';
    tb.innerHTML=`<div class="card" style="border:2px solid var(--gold);background:linear-gradient(135deg,#FFFBF0,#FFF5D6);text-align:center;padding:26px;">
      <div style="font-size:34px;margin-bottom:10px;">✅</div>
      <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;">Your WTICCL Pickup Token</div>
      <div class="mono" style="font-size:30px;font-weight:700;color:var(--navy);letter-spacing:5px;">${token}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:10px;font-weight:600;">Present this token to our courier on arrival.</div>
    </div>`;
  }
  toast('✅ Pickup scheduled! Token: '+token);
}

function doBook() {
  if(!S.bookState) S.bookState={cargo:'printing',from:'Pakistan',to:'USA',zip:'',sName:S.user.name||'',sAddr:'',rName:'',rAddr:'',rPhone:'',weight:'',service:'JFK Direct Flight',desc:''};
  const b=S.bookState;
  b.from   =(document.getElementById('bk-from')||{}).value||b.from;
  b.to     =(document.getElementById('bk-to')||{}).value||b.to;
  b.zip    =(document.getElementById('bk-zip')||{}).value||b.zip;
  b.sName  =(document.getElementById('bk-sname')||{}).value||b.sName;
  b.sAddr  =(document.getElementById('bk-saddr')||{}).value||b.sAddr;
  b.rName  =(document.getElementById('bk-rname')||{}).value||b.rName;
  b.rPhone =(document.getElementById('bk-rphone')||{}).value||b.rPhone;
  b.rAddr  =(document.getElementById('bk-raddr')||{}).value||b.rAddr;
  b.weight =(document.getElementById('bk-weight')||{}).value||b.weight;
  b.service=(document.getElementById('bk-service')||{}).value||b.service;
  b.desc   =(document.getElementById('bk-desc')||{}).value||b.desc;
  if(!b.rName||!b.weight){ toast('Fill required fields.','#DC2626'); return; }
  const w=parseFloat(b.weight)||1;
  let price=0;
  if(b.cargo==='garments'){ const r=garmRate(b.zip,w); if(r) price=r.price; }
  else if(b.cargo==='printing'){ const rs=printRate(b.zip,b.to,w); const r=rs.find(r=>r.name===b.service)||rs[0]; if(r) price=r.price; }
  const trackId=trid();
  S.shipments.push({...b,trackId,userId:S.user.email,weight:w,price,status:'Processing',createdAt:today(),from:b.from,to:b.to});
  ss({});
  const rb=document.getElementById('bk-result-box');
  if(rb){
    rb.style.display='block';
    rb.innerHTML=`<div class="card" style="border:2px solid var(--green);background:linear-gradient(135deg,#ECFDF5,#D1FAE5);text-align:center;padding:26px;">
      <div style="font-size:34px;margin-bottom:8px;">🎉</div>
      <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;">Shipment Confirmed — Tracking ID</div>
      <div class="mono" style="font-size:20px;font-weight:700;color:var(--navy);letter-spacing:3px;">${trackId}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:10px;font-weight:600;">Estimated: <strong style="color:var(--navy);font-size:16px;">${pkr(price)}</strong>${price===0?' (contact for quote)':''} · ${esc(b.service)}</div>
    </div>`;
  }
  toast('🎉 Booked! ID: '+trackId);
}

function doTrack(carrier) {
  if(!carrier) return;
  if(!S.trackState||!S.trackState.wticcl) S.trackState={wticcl:{q:'',err:''},dhl:{q:'',err:''},fedex:{q:'',err:''},ups:{q:'',err:''},iata:{q:'',err:''}};
  const inp=document.getElementById('trk-'+carrier);
  const q=inp?inp.value.trim().toUpperCase():'';
  S.trackState[carrier]={q, err: q?'':'Please enter a tracking number.'};
  ss({});
}

    <div class="field"><div class="field-label">Service</div><select id="m-svc" class="inp">${['JFK Direct Flight','Via UK – UPS Expedite','Via UK – UPS Saver','Via UK – DHL','Direct DHL'].map(v=>`<option${s.service===v?' selected':''}>${v}</option>`).join('')}</select></div>
    <div class="field"><div class="field-label">Recipient Name</div><input id="m-rname" class="inp" value="${esc(s.rName||'')}"></div>
    <div class="field"><div class="field-label">Recipient Address</div><textarea id="m-raddr" class="inp" rows="2">${esc(s.rAddr||'')}</textarea></div>
    <div style="display:flex;gap:10px;margin-top:6px;"><button class="btn btn-navy btn-full" data-action="save-ship">💾 Save</button><button class="btn btn-muted btn-full" data-action="modal-close">Cancel</button></div>`);
}
function saveShip() {
  const idx=+document.getElementById('m-idx').value; const s=S.shipments[idx]; if(!s) return;
  s.from=document.getElementById('m-from').value; s.to=document.getElementById('m-to').value;
  s.weight=document.getElementById('m-wt').value; s.price=document.getElementById('m-price').value;
  s.status=document.getElementById('m-status').value; s.service=document.getElementById('m-svc').value;
  s.rName=document.getElementById('m-rname').value; s.rAddr=document.getElementById('m-raddr').value;
  closeModal(); ss({}); toast('✅ Shipment updated.');
}

function openEditPickModal(token) {
  const p=S.pickups.find(x=>x.token===token); if(!p) return;
  modal(`
    <div class="modal-header"><span class="modal-title">Edit Pickup</span><button class="modal-close" data-action="modal-close">×</button></div>
    <input type="hidden" id="m-tok" value="${esc(token)}">
    <div class="g2">
      <div class="field"><div class="field-label">Name</div><input id="m-name" class="inp" value="${esc(p.name)}"></div>
      <div class="field"><div class="field-label">Phone</div><input id="m-phone" class="inp" value="${esc(p.phone)}"></div>
    </div>
    <div class="field"><div class="field-label">Address</div><input id="m-addr" class="inp" value="${esc(p.address)}"></div>
    <div class="g2">
      <div class="field"><div class="field-label">Date</div><input id="m-date" class="inp" type="date" value="${esc(p.date)}"></div>
      <div class="field"><div class="field-label">Status</div><select id="m-pstatus" class="inp">${['Scheduled','Completed','Cancelled'].map(v=>`<option${p.status===v?' selected':''}>${v}</option>`).join('')}</select></div>
    </div>
    <div class="field"><div class="field-label">Packages</div><input id="m-pkgs" class="inp" type="number" value="${esc(p.packages)}"></div>
    <div class="field"><div class="field-label">Notes</div><textarea id="m-notes" class="inp" rows="2">${esc(p.notes||'')}</textarea></div>
    <div style="display:flex;gap:10px;margin-top:6px;"><button class="btn btn-navy btn-full" data-action="save-pickup">💾 Save</button><button class="btn btn-muted btn-full" data-action="modal-close">Cancel</button></div>`);
}
function savePickup() {
  const tok=document.getElementById('m-tok').value; const p=S.pickups.find(x=>x.token===tok); if(!p) return;
  p.name=document.getElementById('m-name').value; p.phone=document.getElementById('m-phone').value;
  p.address=document.getElementById('m-addr').value; p.date=document.getElementById('m-date').value;
  p.status=document.getElementById('m-pstatus').value; p.packages=document.getElementById('m-pkgs').value;
  p.notes=document.getElementById('m-notes').value;
  closeModal(); ss({}); toast('✅ Pickup updated.');
}

function openEditUserModal(email) {
  const u=S.users.find(x=>x.email===email); if(!u) return;
  modal(`
    <div class="modal-header"><span class="modal-title">Edit Customer</span><button class="modal-close" data-action="modal-close">×</button></div>
    <input type="hidden" id="m-uemail" value="${esc(email)}">
    <div class="field"><div class="field-label">Full Name</div><input id="m-uname" class="inp" value="${esc(u.name)}"></div>
    <div class="field"><div class="field-label">Email (read-only)</div><input class="inp" value="${esc(u.email)}" readonly style="opacity:.6;"></div>
    <div class="field"><div class="field-label">Phone</div><input id="m-uphone" class="inp" value="${esc(u.phone||'')}"></div>
    <div class="field"><div class="field-label">Company</div><input id="m-ucompany" class="inp" value="${esc(u.company||'')}"></div>
    <div style="display:flex;gap:10px;margin-top:6px;"><button class="btn btn-navy btn-full" data-action="save-user">💾 Save</button><button class="btn btn-muted btn-full" data-action="modal-close">Cancel</button></div>`);
}
function saveUser() {
  const email=document.getElementById('m-uemail').value; const u=S.users.find(x=>x.email===email); if(!u) return;
  u.name=document.getElementById('m-uname').value; u.phone=document.getElementById('m-uphone').value; u.company=document.getElementById('m-ucompany').value;
  closeModal(); ss({}); toast('✅ Customer updated.');
}

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════
render();
</script>
</body>
</html>
